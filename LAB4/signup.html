<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>Signup</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
    <div class="page">
        <header class="site-header">
            <h1>인프밍 영화 정보 사이트입니다.</h1>

            <nav class="nav-links">
                <a href="index.html">메인페이지</a>
                <a href="login.html">로그인</a>
                <a href="signup.html">회원가입</a>
            </nav>
        </header>

        <div class="form-page">
            <div class="form-box">
                <h2>회원가입</h2>

                <form action="login.html" method="get">
                    <p>
                        이름
                        <input type="text" name="username" placeholder="이름을 입력하세요" required>
                    </p>

                    <p>
                        이메일
                        <input type="email" name="email" placeholder="name@example.com" required>
                    </p>

                    <p>
                        생년월일
                        <input type="date" name="birth" required>
                    </p>

                    <p>
                        아이디
                        <input type="text" name="userid" placeholder="아이디를 입력하세요" required>
                    </p>

                    <p>
                        비밀번호
                        <input type="password" name="userpw" placeholder="비밀번호를 입력하세요" required>
                    </p>

                    <p>
                        좋아하는 장르
                        <select name="genre">
                            <option value="SF">SF</option>
                            <option value="Action">Action</option>
                            <option value="Drama">Drama</option>
                            <option value="Animation">Animation</option>
                        </select>
                    </p>

                    <div class="form-buttons">
                        <input type="submit" value="Signup">
                        <input type="reset" value="Cancel">
                    </div>
                </form>

                <p class="link-line">
                    <a href="login.html">로그인 페이지로 이동</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
