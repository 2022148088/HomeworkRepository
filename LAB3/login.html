<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Login</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
    <div class="page">

        <div class="title-area">
            <div class="title-box">
                <h1>로그인 페이지입니다.</h1>
            </div>
        </div>

        <div class="nav-bar">
            <a href="index.html">메인페이지</a>
            <a href="login.html">로그인</a>
            <a href="signup.html">회원가입</a>
        </div>

        <div class="form-box">
            <form action="index.html" method="get">

                <p>아이디<br>
                <input type="text" name="userid" placeholder="아이디 입력" required></p>

                <p>비밀번호<br>
                <input type="password" name="userpw" placeholder="비밀번호 입력" required></p>

                <p>
                    <input type="submit" value="Login">
                    <input type="reset" value="Cancel">
                </p>

                <p><a href="signup.html">회원가입 페이지로 이동</a></p>

            </form>
        </div>
    </div>
</body>
</html>
