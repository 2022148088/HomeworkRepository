<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Signup</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
    <div class="page">

        <div class="title-area">
            <div class="title-box">
                <h1>회원가입 페이지입니다.</h1>
            </div>
        </div>

        <div class="nav-bar">
            <a href="index.html">메인페이지</a>
            <a href="login.html">로그인</a>
            <a href="signup.html">회원가입</a>
        </div>

        <div class="form-box">
            <form action="login.html" method="get">

                <p>이름<br>
                <input type="text" name="username" autofocus required autocomplete="on"></p>

                <p>생일<br>
                <input type="date" name="birth" required></p>

                <p>성별<br>
                <input type="radio" name="gender" value="male"> 남성
                <input type="radio" name="gender" value="female"> 여성
                </p>

                <p>학년<br>
                <input type="number" name="grade" min="1" max="4" step="1" required></p>

                <p>아이디<br>
                <input type="text" name="userid" placeholder="아이디 입력" required autocomplete="on"></p>

                <p>비밀번호<br>
                <input type="password" name="userpw" placeholder="비밀번호 입력" required></p>

                <p>이메일<br>
                <input type="email" name="email" placeholder="name@example.com" required autocomplete="on"></p>

                <p>보안 질문<br>
                <select name="question" required>
                    <option value="">질문을 선택하세요</option>
                    <option value="movie">가장 좋아하는 영화는?</option>
                    <option value="food">가장 좋아하는 음식은?</option>
                    <option value="pet">가장 좋아하는 반려동물 이름은?</option>
                </select></p>

                <p>답변<br>
                <input type="text" name="answer" required></p>

                <p>
                    <input type="submit" value="Signup">
                    <input type="reset" value="Cancel">
                </p>

                <p><a href="login.html">로그인 페이지로 이동</a></p>

            </form>
        </div>
    </div>
</body>
</html>
