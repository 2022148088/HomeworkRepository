<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Signup</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
    <h1>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>

    <p>
        <a href="login.html">로그인</a>
        <a href="signup.html">회원가입</a>
    </p>

    <form action="login.html" method="get" class="box">
        <p>
            이름 :
            <input type="text" name="username" autofocus required autocomplete="on">
        </p>

        <p>
            생일 :
            <input type="date" name="birth" required>
        </p>

        <p>
            성별 :
            <input type="radio" name="gender" value="male"> 남성
            <input type="radio" name="gender" value="female"> 여성
        </p>

        <p>
            학년 :
            <input type="number" name="grade" min="1" max="4" step="1" required>
        </p>

        <p>
            아이디 :
            <input type="text" name="id" placeholder="아이디 입력" required autocomplete="on">
        </p>

        <p>
            비밀번호 :
            <input type="password" name="pw" placeholder="비밀번호 입력" required>
        </p>

        <p>
            이메일 :
            <input type="email" name="email" placeholder="name@example.com" required autocomplete="on">
        </p>

        <p>
            보안 질문 :
            <select name="question" required>
                <option value="">질문을 선택하세요</option>
                <option value="movie">가장 좋아하는 영화는?</option>
                <option value="pet">가장 좋아하는 반려동물 이름은?</option>
                <option value="food">가장 좋아하는 음식은?</option>
            </select>
        </p>

        <p>
            답변 :
            <input type="text" name="answer" required>
        </p>

        <p>
            <input type="submit" value="Signup">
            <input type="button" value="Login" onclick="location.href='login.html'">
        </p>
    </form>
</body>
</html>
