<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Login</title>
    <link rel="stylesheet" type="text/css" href="main.css">
</head>
<body>
    <h1>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>

    <p>
        <a href="login.html">로그인</a>
        <a href="signup.html">회원가입</a>
    </p>

    <form action="#" method="get" class="box">
        <p>
            아이디 :
            <input type="text" name="id" placeholder="아이디 입력" required>
        </p>

        <p>
            비밀번호 :
            <input type="password" name="pw" placeholder="비밀번호 입력" required>
        </p>

        <p>
            <input type="submit" value="Login">
            <input type="button" value="Signup" onclick="location.href='signup.html'">
        </p>
    </form>
</body>
</html>
